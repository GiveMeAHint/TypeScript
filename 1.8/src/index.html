<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cropping</title>
</head>
<body>
    <div id="app">
        <p>You can crop image and download after</p>
        <div class="buttons-group">
            <input type="file" id="image-upload" style="display:none;" accept="image/*" />
            <button id="upload-button">Upload image</button>
            <button id="crop-button" style="display:none;">Crop image</button>
            <button id="download-button" style="display:none;">Download new image</button>
        </div>
        <div class="cropped-container" style="display:none;">
            <p>Cropped image:</p>
            <img src="#" alt="" id="image-cropped">
        </div>
        <div class="image-wrapper" style="display:none;">
            <img id="displayed-image" src="#" alt="">
        </div>
    </div>
    <script type="module" src="main.ts"></script>
</body>
</html>
